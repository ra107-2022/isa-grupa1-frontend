<div class="trending-page">
  <div class="header">

    <div class="chart-toggle-wrapper">
      <button
        mat-raised-button
        color="primary"
        (click)="swapShowing()"
        style="margin: 10px;"
      >
        {{ showingTrending ? "Show normal feed" : "Show trending" }}
      </button>

      <app-watchparty></app-watchparty>


      <span class="spacer"></span>

      <button
        class="chart-toggle-btn"
        (click)="toggleChart()"
        *ngIf="showingTrending"
      >
        Performance Chart
        <span class="arrow" [class.open]="showChart">v</span>
      </button>

      <div class="chart-dropdown" *ngIf="showChart">
        <app-performance-graph></app-performance-graph>
      </div>
    </div>

  </div>

  <div
    class="click-catcher"
    *ngIf="showChart"
    (click)="closeChart()"
  ></div>
</div>

<!-- TOP 3 TRENDING SECTION 
 (click)="gotoVideo(video.id)" -->
<div class="trending-section" *ngIf="topTrendingVideos.length > 0">
  <h2 class="section-title">Trending Now 🔥</h2>
  <div class="video-grid">
    <div *ngFor="let video of topTrendingVideos">
      <app-video-card
        (click)="playInWatchParty(video)"
        [thumbnailUrl]="video.thumbnailSafeUrl"
        [title]="video.title"
        [creator]="video.creator"
        [views]="video.views"
        [duration]="video.duration"
        [isLive]="video.isLive"
        [premiereDate]="video.premiereDate"
      ></app-video-card>
    </div>
  </div>
  <hr class="section-divider">
</div>

<div style="display: flex; flex-wrap: wrap; gap: 32px; padding: 24px; background: var(--color-bg-main, #181818);">
	<div *ngFor="let video of videos">
		<app-video-card
      (click)="playInWatchParty(video)"
      [thumbnailUrl]="video.thumbnailSafeUrl"
      [title]="video.title"
      [creator]="video.creator"
      [views]="video.views"
      [duration]="video.duration"
      [isLive]="video.isLive"
      [premiereDate]="video.premiereDate"
		></app-video-card>
	</div>
</div>
